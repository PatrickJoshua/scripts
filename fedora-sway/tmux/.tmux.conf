setw -g mode-keys vi
set -g mouse on

# Update the status bar every x seconds
set -g status-interval 60

set -g status-right "#(~/scripts/fedora-sway/tmux/tmux-status-bar-stats.sh) | %a %m/%d %H:%M"
set -g status-right-length 120
